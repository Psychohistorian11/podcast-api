name: "🚀 Pipeline Producción"

on:
  push:
    branches: [main]  
  pull_request:         # Significa que se hará ejecturá el pipeline cuando se pushee a main y pr al main
    branches: [main]

jobs:  #tareas a ejectuar 
  production:  #nombre del job
    runs-on: ubuntu-latest #ejecuta todo en una maquina ubuntu NUEVA sin nada, los steps se encargan de las diferentes instalaciones

    steps:
      - name: "Checkout código"
        uses: actions/checkout@v4 #descargar el repo en la MV de ubuntu

      - name: "Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Ubuntu ya tiene python pero necesitamos 3.11

      - name: "Instalar dependencias"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Ejecutar pruebas" 
        run: | # : 'Ejecuta este comando en la terminal'  la siguiente linea tiene --cov-report=xml -v es super importante para generar el reporte de cobertura
          pytest --cov=app --cov-report=term-missing --cov-report=xml -v
          
        
      # si algún test falla el pipeline MUERE, no llegamos al step siguiente
      - name: "Validar cobertura mínima (≥85%)"
      # este RUN contiene:
      # abre el archivo coverage.xml, extrae el elemento raiz, luego obtiene el atributo line-rate y lo multiplica por 100 para sacar el porcentaje
      #COVERAGE es una variable y en la linea 45 se llama.
        run: |
          COVERAGE=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib['line-rate']) * 100
          print(f'{rate:.0f}')
          ")
          echo "Cobertura actual: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 85 ]; then
            echo "FALLO: Cobertura ${COVERAGE}% es menor al 85% requerido para PRODUCCIÓN"
            exit 1
          fi
          echo "Cobertura ${COVERAGE}% cumple el mínimo de 85% para producción"

      - name: "Validar build Docker"
        run: |
          docker build -t podcast-api:${{ github.sha }} .
        # el docker build comprueba que el contenedor se construya bien, el github.sha es el hash único del commit que se uso para lanzar el pipeline
        #y el punto (.) es para decirle donde esta el Dockerfile

      - name: "Deploy a ambiente Producción"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # muy importante este paso, solo se manda a producción si se hizo push (pr no vale)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}"
          echo "Deploy a PRODUCCIÓN iniciado"
        # curl : peticiones http desde bash
        # secrets.RENDER_DEPLOY_HOOK_PROD : es decirle a RENDER oeee, despliega la aplicación con el código nuevo