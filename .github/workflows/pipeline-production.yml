name: "🚀 Pipeline Producción"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  production:
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout código"
        uses: actions/checkout@v4

      - name: "🐍 Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Instalar dependencias"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "🧪 Ejecutar pruebas"
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml -v

      - name: "📊 Validar cobertura mínima (≥85%)"
        run: |
          COVERAGE=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib['line-rate']) * 100
          print(f'{rate:.0f}')
          ")
          echo "Cobertura actual: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 85 ]; then
            echo "❌ FALLO: Cobertura ${COVERAGE}% es menor al 85% requerido para PRODUCCIÓN"
            exit 1
          fi
          echo "✅ Cobertura ${COVERAGE}% cumple el mínimo de 85% para producción"

      - name: "🐳 Validar build Docker"
        run: |
          docker build -t podcast-api:${{ github.sha }} .

      - name: "🚀 Deploy a ambiente Producción"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}"
          echo "✅ Deploy a PRODUCCIÓN iniciado"